name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          # macos-latest is temporarily disabled: Windows is the primary
          # target platform, and internal/adapter/msbuild.TestProjectRoot
          # fails structurally on macOS (see #8). Re-enable once #8 lands.
          # - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Output "Files need gofmt:`n$($unformatted -join "`n")"
            exit 1
          }

      - name: Check formatting (macOS)
        if: runner.os != 'Windows'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...
