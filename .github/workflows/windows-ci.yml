name: Windows CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check formatting
        shell: pwsh
        run: |
          $unformatted = gofmt -l .
          if ($unformatted) {
            Write-Output "Files need gofmt:`n$($unformatted -join "`n")"
            exit 1
          }

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...
